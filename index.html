<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 商业潜力雷达系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #0d1117; /* 极暗科技蓝背景 */
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.4), inset 0 0 10px rgba(88, 101, 242, 0.2);
            border: 1px solid rgba(88, 101, 242, 0.6);
        }
        .avatar-glow {
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.6);
            border: 3px solid #5865f2;
        }
        .score-text {
            background: -webkit-linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tag-pill {
            background: rgba(48, 54, 61, 0.8);
            border: 1px solid #484f58;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
            margin: 4px;
            color: #8b949e;
            transition: all 0.3s;
        }
        .tag-pill:hover {
            border-color: #5865f2;
            color: #fff;
        }
        /* 搜索加载动画 */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #5865f2;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
            <h1 class="text-2xl font-bold flex items-center gap-2 text-white">
                <span class="text-indigo-500">⚡</span> IP 商业潜力雷达系统
                <span class="text-xs bg-indigo-600 px-2 py-1 rounded text-white ml-2">v2.0 全量数据版</span>
            </h1>
            
            <div class="flex w-full md:w-auto glass-panel p-1 rounded-lg">
                <input type="text" id="searchInput" placeholder="输入角色名称 (如: Tifa Lockhart)" 
                       class="bg-transparent text-white px-4 py-2 w-full md:w-80 outline-none"
                       onkeypress="if(event.key === 'Enter') startSearch()">
                <button onclick="startSearch()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-md transition-colors shadow-lg font-medium">
                    🚀 点火挖掘
                </button>
            </div>
        </header>

        <div id="loadingState" class="hidden flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-indigo-400 animate-pulse">全网数据并发爬取与大模型分析中... (预计需 10-30 秒)</p>
        </div>

        <div id="resultsContainer" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="col-span-1 glass-panel neon-glow p-6 flex flex-col items-center text-center relative overflow-hidden">
                <div class="w-40 h-40 rounded-full avatar-glow mb-4 overflow-hidden bg-gray-800">
                    <img id="charAvatar" src="" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <h2 id="charName" class="text-3xl font-bold text-white mb-1">加载中</h2>
                <span id="charCategory" class="bg-gray-700 px-3 py-1 rounded text-sm text-gray-300 mb-6">分类</span>
                
                <div class="w-full bg-gray-800 rounded-xl p-4 mt-auto border border-gray-700">
                    <p class="text-sm text-gray-400 mb-1">综合霸权总分</p>
                    <p id="charScore" class="text-6xl font-black score-text mb-2">0.0</p>
                    <span id="charTier" class="inline-block bg-yellow-600 text-white px-4 py-1 rounded-full font-bold shadow-[0_0_10px_rgba(202,138,4,0.6)]">
                        计算中
                    </span>
                </div>
            </div>

            <div class="col-span-1 md:col-span-2 glass-panel p-6">
                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">📊 五维战力雷达盘</h3>
                <div id="radarChart" class="w-full h-64"></div>
                
                <div class="grid grid-cols-3 gap-4 mt-6">
                    <div class="bg-gray-800 p-4 rounded-lg text-center border border-gray-700">
                        <p class="text-xs text-gray-400 mb-1">TikTok 爆款指数</p>
                        <p id="idxTiktok" class="text-2xl font-bold text-pink-500">0</p>
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg text-center border border-gray-700">
                        <p class="text-xs text-gray-400 mb-1">周边开发指数</p>
                        <p id="idxMerch" class="text-2xl font-bold text-yellow-500">0</p>
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg text-center border border-gray-700">
                        <p class="text-xs text-gray-400 mb-1">CP 二创指数</p>
                        <p id="idxSocial" class="text-2xl font-bold text-purple-500">0</p>
                    </div>
                </div>
            </div>

            <div class="col-span-1 md:col-span-3 glass-panel p-6">
                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">🧬 深度特征全量挖掘库</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <p class="text-sm text-indigo-400 mb-2 font-bold">👁️ 视觉符号与外观特征</p>
                        <div id="tagsVisual" class="mb-4"></div>
                        
                        <p class="text-sm text-pink-400 mb-2 font-bold">🎭 性格底色与行为标签</p>
                        <div id="tagsPersona"></div>
                    </div>
                    <div>
                        <p class="text-sm text-green-400 mb-2 font-bold">⚔️ 角色定位与核心专长</p>
                        <div id="tagsRole" class="mb-4"></div>
                        
                        <p class="text-sm text-red-400 mb-2 font-bold">❤️ 社交动态与受众共鸣</p>
                        <div id="tagsResonance"></div>
                    </div>
                </div>
            </div>

            <div class="col-span-1 md:col-span-3 glass-panel p-6">
                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">📈 过去半年热度趋势分析 (Google Trends)</h3>
                <div id="trendChart" class="w-full h-72"></div>
            </div>

        </div>
    </div>

    <script>
        // ！！！将这里的 URL 替换为你 n8n Webhook 的 Production URL 或 Test URL ！！！
        const WEBHOOK_URL = "YOUR_N8N_WEBHOOK_URL"; 
        
        let radarChartInstance = null;
        let trendChartInstance = null;

        async function startSearch() {
            const inputVal = document.getElementById('searchInput').value.trim();
            if (!inputVal) return alert("请输入角色名称！");

            // UI 切换：显示加载状态，隐藏旧结果
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('loadingState').classList.add('flex');
            document.getElementById('resultsContainer').classList.add('hidden');

            try {
                // 发送 POST 请求给 n8n
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character: inputVal })
                });

                if (!response.ok) throw new Error("网络响应失败，请检查 n8n 接口状态");
                
                const responseData = await response.json();
                
                // n8n 代码块通常返回数组包对象: [{ json: {...} }]
                const data = Array.isArray(responseData) ? responseData[0].json : (responseData.json || responseData);
                
                // 渲染数据
                renderData(data);

                // UI 切换：隐藏加载，显示结果
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('loadingState').classList.remove('flex');
                document.getElementById('resultsContainer').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("请求出错：" + error.message + "\n请确保 n8n 正在监听 (Listen for test event) 或已激活。");
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('loadingState').classList.remove('flex');
            }
        }

        function renderData(data) {
            // 1. 基础信息解析
            const verdict = data["1_Global_Verdict"] || data["1_Global_Verdict (最终霸权评级)"];
            const radar = data["2_Five_Dimensional_Radar"] || data["2_Five_Dimensional_Radar (五维基础雷达分 0-100)"];
            const commercial = data["3_Commercial_Viability_Indexes"] || data["3_Commercial_Viability_Indexes (实战商业变现指数 0-100)"];
            const attributes = data["4_Deep_Attribute_Mining"] || data["4_Deep_Attribute_Mining (深度特征挖掘库)"];
            const media = data["5_Media_And_Assets"] || data["5_Media_And_Assets (多媒体视觉库)"];
            const trend = data["6_Popularity_Trend"] || []; // 新增趋势数组

            // 2. 渲染左侧面板
            document.getElementById('charName').innerText = verdict.character_name;
            document.getElementById('charCategory').innerText = verdict.character_category;
            document.getElementById('charScore').innerText = verdict.final_weighted_score;
            document.getElementById('charTier').innerText = verdict.market_tier;
            document.getElementById('charAvatar').src = media.main_avatar_url || 'https://via.placeholder.com/150/1f2937/8b949e?text=No+Image';

            // 3. 渲染商业指数
            document.getElementById('idxTiktok').innerText = commercial.tiktok_virality_index;
            document.getElementById('idxMerch').innerText = commercial.merchandise_value_index;
            document.getElementById('idxSocial').innerText = commercial.social_shipping_index;

            // 4. 渲染挖掘标签 (辅助函数)
            const renderTags = (domId, arr) => {
                document.getElementById(domId).innerHTML = arr.map(tag => `<span class="tag-pill">${tag}</span>`).join('');
            };
            
            // 兼容中英文键名
            const getAttr = (keyEn, keyCn) => attributes[keyEn] || attributes[keyCn] || ["无数据"];
            
            renderTags('tagsVisual', getAttr("A_Visual_Symbols", "A_Visual_Symbols (视觉符号与外观)"));
            renderTags('tagsPersona', getAttr("B_Persona_Behavior", "B_Persona_Behavior (性格底色与行为)"));
            renderTags('tagsRole', getAttr("C_Role_Expertise", "C_Role_Expertise (角色定位与专长)"));
            renderTags('tagsResonance', getAttr("D_Social_Resonance", "D_Social_Resonance (社交动态与共鸣)"));

            // 5. 渲染雷达图
            renderRadarChart(radar);
            
            // 6. 渲染热度趋势图
            renderTrendChart(trend);
        }

        function renderRadarChart(radarData) {
            if (!radarChartInstance) radarChartInstance = echarts.init(document.getElementById('radarChart'));
            
            const option = {
                tooltip: { confine: true, backgroundColor: 'rgba(20, 20, 30, 0.9)', textStyle: { color: '#fff' } },
                radar: {
                    indicator: [
                        { name: '社区底盘', max: 100 },
                        { name: '视觉同人', max: 100 },
                        { name: '视频破圈', max: 100 },
                        { name: '剧情厚度', max: 100 },
                        { name: '即时热度', max: 100 }
                    ],
                    shape: 'polygon',
                    splitNumber: 4,
                    axisName: { color: '#a0aec0' },
                    splitLine: { lineStyle: { color: ['rgba(88, 101, 242, 0.1)', 'rgba(88, 101, 242, 0.2)', 'rgba(88, 101, 242, 0.4)', 'rgba(88, 101, 242, 0.6)'] } },
                    splitArea: { show: false },
                    axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: [
                            radarData.community_score, 
                            radarData.visual_art_score, 
                            radarData.video_virality_score, 
                            radarData.lore_depth_score, 
                            radarData.search_trend_score
                        ],
                        name: '基础五维能力',
                        symbol: 'circle',
                        symbolSize: 6,
                        itemStyle: { color: '#5865f2' },
                        areaStyle: { color: 'rgba(88, 101, 242, 0.4)' },
                        lineStyle: { color: '#5865f2', width: 2 }
                    }]
                }]
            };
            radarChartInstance.setOption(option);
        }

        function renderTrendChart(trendArray) {
            if (!trendChartInstance) trendChartInstance = echarts.init(document.getElementById('trendChart'));

            // 提取 X轴和Y轴数据
            const xData = trendArray.map(item => item.date);
            const yData = trendArray.map(item => item.score);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(20, 20, 30, 0.9)',
                    borderColor: '#00f2fe',
                    textStyle: { color: '#fff' }
                },
                grid: { left: '3%', right: '4%', bottom: '5%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: xData,
                    axisLine: { lineStyle: { color: '#30363d' } },
                    axisLabel: { color: '#8b949e', margin: 15 }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.05)' } },
                    axisLabel: { color: '#8b949e' }
                },
                series: [{
                    name: '热度分数',
                    type: 'line',
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 8,
                    data: yData,
                    itemStyle: { color: '#00f2fe', borderColor: '#fff', borderWidth: 2 },
                    lineStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#4facfe' }, { offset: 1, color: '#00f2fe' }
                        ]),
                        width: 4,
                        shadowColor: 'rgba(0, 242, 254, 0.5)',
                        shadowBlur: 10
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(0, 242, 254, 0.4)' },
                            { offset: 1, color: 'rgba(0, 242, 254, 0)' }
                        ])
                    }
                }]
            };
            trendChartInstance.setOption(option);
        }

        // 监听窗口大小改变，重绘图表使其自适应
        window.addEventListener('resize', () => {
            if(radarChartInstance) radarChartInstance.resize();
            if(trendChartInstance) trendChartInstance.resize();
        });
    </script>
</body>
</html>
