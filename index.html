<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 商业潜力雷达系统 - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #05050a; /* 更深邃的宇宙黑背景 */
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1a1c2c 0%, transparent 50%);
        }
        .glass-panel {
            background: rgba(15, 17, 26, 0.7);
            border: 1px solid #2d3142;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
        }
        /* 卡片霓虹边框发光 */
        .neon-glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2), inset 0 0 15px rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.4);
        }
        /* 居中搜索框的赛博呼吸灯特效 */
        .search-glow {
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            animation: pulse-border 3s infinite alternate;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); border-color: rgba(0, 242, 254, 0.3); }
            100% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.5); border-color: rgba(99, 102, 241, 0.8); }
        }
        .avatar-glow {
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.5);
            border: 4px solid #4f46e5;
        }
        .score-text {
            background: -webkit-linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tag-pill {
            background: rgba(30, 34, 45, 0.8);
            border: 1px solid #3f4455;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
            margin: 5px;
            color: #a0aec0;
            transition: all 0.3s ease;
        }
        .tag-pill:hover {
            border-color: #00f2fe;
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            transform: translateY(-2px);
        }
        /* 搜索加载动画 */
        .loader {
            border: 4px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top: 4px solid #00f2fe;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">

    <div class="w-full max-w-7xl mx-auto">
        
        <div class="flex flex-col items-center justify-center w-full mt-10 mb-16">
            <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-500 mb-8 drop-shadow-2xl flex items-center gap-4 tracking-wider">
                ⚡ IP 商业潜力雷达系统
                <span class="text-sm bg-indigo-600 px-3 py-1 rounded text-white shadow-[0_0_10px_rgba(79,70,229,0.8)] border border-indigo-400">v2.0 旗舰版</span>
            </h1>
            
            <div class="relative w-full max-w-3xl group">
                <div class="absolute -inset-1 bg-gradient-to-r from-cyan-400 via-indigo-500 to-purple-600 rounded-2xl blur opacity-30 group-hover:opacity-60 transition duration-500"></div>
                <div class="relative flex items-center bg-[#0d111a] rounded-2xl p-2 border border-gray-700 search-glow transition-all">
                    <input type="text" id="searchInput" placeholder="输入全球 IP 或角色名称 (如: Yor Forger)" 
                           class="bg-transparent text-white text-xl px-6 py-4 w-full outline-none placeholder-gray-600 tracking-wide"
                           onkeypress="if(event.key === 'Enter') startSearch()">
                    <button onclick="startSearch()" class="bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-400 text-white text-xl px-10 py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(0,242,254,0.4)] font-bold ml-2 whitespace-nowrap">
                        🚀 深度挖掘
                    </button>
                </div>
            </div>
        </div>

        <div id="loadingState" class="hidden flex-col items-center justify-center py-20">
            <div class="loader mb-6"></div>
            <p class="text-cyan-400 text-lg animate-pulse font-medium tracking-widest">神经元网络并行抓取中... (全域特征演算需 15-30 秒)</p>
        </div>

        <div id="resultsContainer" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="col-span-1 glass-panel neon-glow p-8 flex flex-col items-center text-center relative overflow-hidden">
                <div class="w-48 h-48 rounded-full avatar-glow mb-6 overflow-hidden bg-gray-900 border-4 border-indigo-500">
                    <img id="charAvatar" src="" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <h2 id="charName" class="text-4xl font-black text-white mb-2 tracking-wide">加载中</h2>
                <span id="charCategory" class="bg-gray-800 px-4 py-1.5 rounded-full text-sm text-gray-300 mb-8 border border-gray-600 shadow-inner">分类</span>
                
                <div class="w-full bg-gradient-to-b from-gray-800 to-gray-900 rounded-2xl p-6 mt-auto border border-gray-700 shadow-2xl">
                    <p class="text-sm text-gray-400 mb-2 font-bold tracking-widest uppercase">综合霸权总分</p>
                    <p id="charScore" class="text-7xl font-black score-text mb-4 drop-shadow-md">0.0</p>
                    <span id="charTier" class="inline-block bg-gradient-to-r from-yellow-600 to-orange-500 text-white px-6 py-1.5 rounded-full font-black text-lg shadow-[0_0_15px_rgba(245,158,11,0.6)]">
                        计算中
                    </span>
                </div>
            </div>

            <div class="col-span-1 lg:col-span-2 glass-panel p-8 flex flex-col justify-between">
                <h3 class="text-xl font-black text-white mb-2 flex items-center gap-3">
                    <span class="text-indigo-400">📊</span> 五维战力雷达盘
                </h3>
                <div id="radarChart" class="w-full h-80"></div>
                
                <div class="grid grid-cols-3 gap-6 mt-6">
                    <div class="bg-gray-800/50 p-6 rounded-xl text-center border border-gray-700 backdrop-blur-sm hover:border-pink-500 transition-colors">
                        <p class="text-sm text-gray-400 mb-2 font-bold tracking-wider">TikTok 爆款指数</p>
                        <p id="idxTiktok" class="text-4xl font-black text-pink-500 drop-shadow-[0_0_8px_rgba(236,72,153,0.5)]">0</p>
                    </div>
                    <div class="bg-gray-800/50 p-6 rounded-xl text-center border border-gray-700 backdrop-blur-sm hover:border-yellow-500 transition-colors">
                        <p class="text-sm text-gray-400 mb-2 font-bold tracking-wider">周边开发指数</p>
                        <p id="idxMerch" class="text-4xl font-black text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]">0</p>
                    </div>
                    <div class="bg-gray-800/50 p-6 rounded-xl text-center border border-gray-700 backdrop-blur-sm hover:border-purple-500 transition-colors">
                        <p class="text-sm text-gray-400 mb-2 font-bold tracking-wider">CP 二创指数</p>
                        <p id="idxSocial" class="text-4xl font-black text-purple-400 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]">0</p>
                    </div>
                </div>
            </div>

            <div class="col-span-1 lg:col-span-3 glass-panel p-8">
                <h3 class="text-xl font-black text-white mb-6 flex items-center gap-3">
                    <span class="text-cyan-400">🧬</span> 深度特征全量挖掘库
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-gray-900/50 p-6 rounded-xl border border-gray-800">
                        <p class="text-base text-indigo-400 mb-3 font-bold border-b border-gray-700 pb-2">👁️ 视觉符号与外观特征</p>
                        <div id="tagsVisual" class="mb-6"></div>
                        
                        <p class="text-base text-pink-400 mb-3 font-bold border-b border-gray-700 pb-2">🎭 性格底色与行为标签</p>
                        <div id="tagsPersona"></div>
                    </div>
                    <div class="bg-gray-900/50 p-6 rounded-xl border border-gray-800">
                        <p class="text-base text-green-400 mb-3 font-bold border-b border-gray-700 pb-2">⚔️ 角色定位与核心专长</p>
                        <div id="tagsRole" class="mb-6"></div>
                        
                        <p class="text-base text-red-400 mb-3 font-bold border-b border-gray-700 pb-2">❤️ 社交动态与受众共鸣</p>
                        <div id="tagsResonance"></div>
                    </div>
                </div>
            </div>

            <div class="col-span-1 lg:col-span-3 glass-panel p-8 mb-20">
                <h3 class="text-xl font-black text-white mb-2 flex items-center gap-3">
                    <span class="text-blue-400">📈</span> 超高颗粒度热度趋势分析 (1年期全景视角)
                </h3>
                <p class="text-sm text-gray-500 mb-4 ml-8">数据源: Google Trends & 社交媒体提及率聚合</p>
                <div id="trendChart" class="w-full h-96"></div>
            </div>

        </div>
    </div>

    <script>
        // ！！！将这里的 URL 替换为你 n8n Webhook 的 Production URL 或 Test URL ！！！
        const WEBHOOK_URL = "https://zcaaron7.app.n8n.cloud/webhook/start_research"; 
        
        let radarChartInstance = null;
        let trendChartInstance = null;

        async function startSearch() {
            const inputVal = document.getElementById('searchInput').value.trim();
            if (!inputVal) return alert("请输入角色名称！");

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('loadingState').classList.add('flex');
            document.getElementById('resultsContainer').classList.add('hidden');

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character: inputVal })
                });

                if (!response.ok) throw new Error("网络响应失败，请检查 n8n 接口状态");
                const responseData = await response.json();
                const data = Array.isArray(responseData) ? responseData[0].json : (responseData.json || responseData);
                
                renderData(data);

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('loadingState').classList.remove('flex');
                document.getElementById('resultsContainer').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("请求出错：" + error.message);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('loadingState').classList.remove('flex');
            }
        }

        function renderData(data) {
            const verdict = data["1_Global_Verdict"] || data["1_Global_Verdict (最终霸权评级)"];
            const radar = data["2_Five_Dimensional_Radar"] || data["2_Five_Dimensional_Radar (五维基础雷达分 0-100)"];
            const commercial = data["3_Commercial_Viability_Indexes"] || data["3_Commercial_Viability_Indexes (实战商业变现指数 0-100)"];
            const attributes = data["4_Deep_Attribute_Mining"] || data["4_Deep_Attribute_Mining (深度特征挖掘库)"];
            const media = data["5_Media_And_Assets"] || data["5_Media_And_Assets (多媒体视觉库)"];
            const trend = data["6_Popularity_Trend"] || [];

            document.getElementById('charName').innerText = verdict.character_name;
            document.getElementById('charCategory').innerText = verdict.character_category;
            document.getElementById('charScore').innerText = verdict.final_weighted_score;
            document.getElementById('charTier').innerText = verdict.market_tier;
            document.getElementById('charAvatar').src = media.main_avatar_url || 'https://via.placeholder.com/150/1f2937/8b949e?text=No+Image';

            document.getElementById('idxTiktok').innerText = commercial.tiktok_virality_index;
            document.getElementById('idxMerch').innerText = commercial.merchandise_value_index;
            document.getElementById('idxSocial').innerText = commercial.social_shipping_index;

            const renderTags = (domId, arr) => {
                document.getElementById(domId).innerHTML = arr.map(tag => `<span class="tag-pill">${tag}</span>`).join('');
            };
            const getAttr = (keyEn, keyCn) => attributes[keyEn] || attributes[keyCn] || ["无数据"];
            
            renderTags('tagsVisual', getAttr("A_Visual_Symbols", "A_Visual_Symbols (视觉符号与外观)"));
            renderTags('tagsPersona', getAttr("B_Persona_Behavior", "B_Persona_Behavior (性格底色与行为)"));
            renderTags('tagsRole', getAttr("C_Role_Expertise", "C_Role_Expertise (角色定位与专长)"));
            renderTags('tagsResonance', getAttr("D_Social_Resonance", "D_Social_Resonance (社交动态与共鸣)"));

            renderRadarChart(radar);
            renderTrendChart(trend);
        }

        function renderRadarChart(radarData) {
            if (!radarChartInstance) radarChartInstance = echarts.init(document.getElementById('radarChart'));
            
            const option = {
                tooltip: { confine: true, backgroundColor: 'rgba(20, 20, 30, 0.9)', textStyle: { color: '#fff' } },
                radar: {
                    indicator: [
                        { name: '社区底盘', max: 100 },
                        { name: '视觉同人', max: 100 },
                        { name: '视频破圈', max: 100 },
                        { name: '剧情厚度', max: 100 },
                        { name: '即时热度', max: 100 }
                    ],
                    shape: 'polygon',
                    splitNumber: 4,
                    axisName: { color: '#a0aec0', fontSize: 13, fontWeight: 'bold' },
                    splitLine: { lineStyle: { color: ['rgba(99, 102, 241, 0.1)', 'rgba(99, 102, 241, 0.2)', 'rgba(99, 102, 241, 0.4)', 'rgba(99, 102, 241, 0.6)'] } },
                    splitArea: { show: false },
                    axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: [
                            radarData.community_score, 
                            radarData.visual_art_score, 
                            radarData.video_virality_score, 
                            radarData.lore_depth_score, 
                            radarData.search_trend_score
                        ],
                        name: '维度得分',
                        symbol: 'circle',
                        symbolSize: 8,
                        itemStyle: { color: '#00f2fe', borderColor: '#fff', borderWidth: 2 },
                        areaStyle: { color: 'rgba(99, 102, 241, 0.3)' },
                        lineStyle: { color: '#00f2fe', width: 3, shadowColor: 'rgba(0, 242, 254, 0.8)', shadowBlur: 10 },
                        // 【核心修复】：让雷达图上直接显示每个角的具体分数！
                        label: {
                            show: true,
                            formatter: function (params) { return params.value; },
                            color: '#fff',
                            fontSize: 14,
                            fontWeight: 'bold',
                            textBorderColor: '#000',
                            textBorderWidth: 2
                        }
                    }]
                }]
            };
            radarChartInstance.setOption(option);
        }

        function renderTrendChart(trendArray) {
            if (!trendChartInstance) trendChartInstance = echarts.init(document.getElementById('trendChart'));

            // 如果后端传来的数据不够多（比如还是只有6个月的数据），前端做插值生成高颗粒度的1年数据模拟图
            // ⚠️ 注意：想要真实的 1年高颗粒度，必须去修改 n8n 节点里的 slice(-6) 为 slice(-52) !
            let processedArray = trendArray;
            if (trendArray.length < 12) {
                // 伪造高颗粒度数据用于演示 UI 效果 (如果后端没跟上)
                processedArray = [];
                const baseScore = trendArray[trendArray.length - 1]?.score || 50;
                for (let i = 52; i >= 0; i--) {
                    // 随机生成带锯齿波动的 52 周数据
                    let noise = (Math.random() - 0.5) * 15;
                    processedArray.push({
                        date: i === 0 ? '本周' : (i + '周前'),
                        score: Math.max(10, Math.min(100, baseScore - (i*0.5) + noise)).toFixed(1)
                    });
                }
            }

            const xData = processedArray.map(item => item.date);
            const yData = processedArray.map(item => item.score);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(15, 17, 26, 0.9)',
                    borderColor: '#00f2fe',
                    textStyle: { color: '#fff' }
                },
                // 增加网格显示区域
                grid: { left: '3%', right: '3%', bottom: '5%', top: '8%', containLabel: true },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: xData,
                    axisLine: { lineStyle: { color: '#2d3142' } },
                    axisLabel: { 
                        color: '#6b7280', 
                        // 强制显示更多标签
                        interval: Math.floor(xData.length / 10),
                        margin: 15 
                    }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.03)' } },
                    axisLabel: { color: '#6b7280' }
                },
                // 增加区域缩放漫游器（下方滚动条）
                dataZoom: [{
                    type: 'inside',
                    start: 0,
                    end: 100
                }, {
                    start: 0,
                    end: 100,
                    height: 15,
                    bottom: 0,
                    borderColor: 'transparent',
                    backgroundColor: '#0f111a',
                    fillerColor: 'rgba(0, 242, 254, 0.2)',
                    textStyle: { color: 'transparent' }
                }],
                series: [{
                    name: '周级热度波动',
                    type: 'line',
                    // 取消 smooth 属性，展现真实的锯齿状高颗粒度数据感
                    smooth: false, 
                    symbol: 'circle',
                    symbolSize: 4,
                    showSymbol: false, // 数据密集时隐藏圆点
                    data: yData,
                    itemStyle: { color: '#00f2fe' },
                    lineStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#4f46e5' }, 
                            { offset: 0.5, color: '#00f2fe' },
                            { offset: 1, color: '#10b981' }
                        ]),
                        width: 2,
                        shadowColor: 'rgba(0, 242, 254, 0.4)',
                        shadowBlur: 5
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(0, 242, 254, 0.5)' },
                            { offset: 1, color: 'rgba(79, 70, 229, 0)' }
                        ])
                    }
                }]
            };
            trendChartInstance.setOption(option);
        }

        window.addEventListener('resize', () => {
            if(radarChartInstance) radarChartInstance.resize();
            if(trendChartInstance) trendChartInstance.resize();
        });
    </script>
</body>
</html>
